function StatusBar() {

}

function BottomNav({ root, go }) {
  const items = [
    { key: "home", label: "Home", Icon: HomeIcon },
    { key: "saved", label: "Saved", Icon: Bookmark },
    { key: "profile", label: "Profile", Icon: User },
  ];
  return (
    <div className="flex items-stretch justify-between px-2 pt-2" style={{ borderTop: `1px solid ${C.line}`, background: C.surface, paddingBottom: "22px" }}>
      {items.map(({ key, label, Icon }) => {
        const active = root === key;
        return (
          <button key={key} onClick={() => go(key)} className="flex-1 flex flex-col items-center gap-1 py-1">
            <Icon size={20} color={active ? C.gold : C.muted} strokeWidth={active ? 2.4 : 1.8} />
            <span className="text-xs" style={{ color: active ? C.gold : C.muted, fontFamily: bodyFont, fontWeight: active ? 600 : 400 }}>{label}</span>
          </button>
        );
      })}

  );
}

function Header({ crumb, title, onBack }) {
  return (
    <div className="flex items-center gap-2 px-4 pt-2 pb-3" style={{ borderBottom: `1px solid ${C.line}` }}>
      {onBack && (
        <button onClick={onBack}>
          <ChevronLeft size={20} color={C.chalk} />

      <div>

        <div style={{ color: C.chalk, fontFamily: displayFont, fontWeight: 700, fontSize: "15px" }}>{title}</div>
      </div>
    </div>
  );
}

function SectionEyebrow({ children }) {

    <div className="text-xs mb-2" style={{ color: C.gold, fontFamily: bodyFont, letterSpacing: "0.12em", textTransform: "uppercase", fontWeight: 600 }}>
      {children}

}

/* ---------- NOTES (image/PDF gallery) ---------- */

/* ---------- LEVEL PATH (per chapter, game-mode) ---------- */
function PathScreen({ back, crumb }) {
  const total = 10;
  const completedCount = 6;
  const spacingY = 78;
  const amplitude = 62;
  const centerX = 150;
  const positions = Array.from({ length: total }).map((_, i) => ({
    x: centerX + Math.sin(i * 0.9) * amplitude,
    y: i * spacingY + 50,
  }));
  const pathD = useMemo(() => {
    let d = `M ${positions[0].x} ${positions[0].y}`;
    for (let i = 1; i < positions.length; i++) {
      const midX = (positions[i - 1].x + positions[i].x) / 2;
      const midY = (positions[i - 1].y + positions[i].y) / 2;
      d += ` Q ${positions[i - 1].x} ${positions[i - 1].y} ${midX} ${midY}`;
    }
    return d;
  }, [positions]);
  const totalHeight = positions[positions.length - 1].y + 90;

  return (
    <div className="h-full flex flex-col">
      <div className="flex items-center justify-between px-4 pt-2 pb-3" style={{ borderBottom: `1px solid ${C.line}` }}>
        <div className="flex items-center gap-2">
          <button onClick={back}>
            <ChevronLeft size={20} color={C.chalk} />
          </button>
          <div>
            <div className="text-xs" style={{ color: C.muted, fontFamily: bodyFont }}>{crumb}</div>
            <div style={{ color: C.chalk, fontFamily: displayFont, fontWeight: 700, fontSize: "15px" }}>Level Path</div>
          </div>
        </div>
        <div className="flex items-center gap-0.5">
          {[0, 1, 2].map((i) => <Heart key={i} size={15} color={C.maroon} fill={C.maroon} />)}
        </div>
      </div>
      <div className="overflow-y-auto flex-1 relative" style={{ background: C.bg }}>
        <svg width="300" height={totalHeight} style={{ position: "absolute", left: "50%", transform: "translateX(-150px)", top: 0 }}>
          <path d={pathD} fill="none" stroke={C.line} strokeWidth="6" strokeLinecap="round" strokeDasharray="1 14" />
        </svg>
        <div style={{ position: "relative", height: totalHeight }}>
          {positions.map((pos, i) => {
            const state = i < completedCount ? "done" : i === completedCount ? "current" : "locked";
            const isBoss = (i + 1) % 5 === 0;
            const size = isBoss ? 58 : 48;
            return (
              <React.Fragment key={i}>
                <div className="rounded-full flex items-center justify-center" style={{
                  position: "absolute", left: pos.x - size / 2, top: pos.y - size / 2, width: size, height: size,
                  background: isBoss ? (state === "locked" ? C.surface : C.maroon) : state === "current" ? C.gold : state === "done" ? C.surfaceLight : C.surface,
                  border: isBoss ? `3px solid ${state === "locked" ? C.line : C.chalk}` : state === "current" ? `3px solid ${C.chalk}` : `2px solid ${C.line}`,
                  boxShadow: state === "current" ? `0 0 0 6px rgba(232,169,58,0.18)` : "none",
                }}>
                  {isBoss ? (
                    <Swords size={22} color={state === "locked" ? C.muted : C.chalk} />
                  ) : (
                    <>
                      {state === "done" && <Check size={20} color={C.sage} />}
                      {state === "current" && <Star size={20} color={C.bg} fill={C.bg} />}
                      {state === "locked" && <Lock size={16} color={C.muted} />}
                    </>
                  )}
                </div>
                <div className="text-xs" style={{ position: "absolute", left: pos.x - size / 2, top: pos.y + size / 2 + 4, width: size, textAlign: "center", color: isBoss ? C.maroon : C.muted, fontFamily: bodyFont, fontWeight: isBoss ? 600 : 400 }}>
                  {isBoss ? "Boss" : `Lv ${i + 1}`}
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

                        <Award size={16} color={C.gold} />
                        <span className="text-xs text-center" style={{ color: C.muted, fontFamily: bodyFont, lineHeight: 1.2 }}>{b}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
          <BottomNav root={stack[0].screen} go={goRoot} />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<UstadDemo />);
</script>
</body>
</html>
